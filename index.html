<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackalendar — Lifestyle Tracker</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   TRACKALENDAR v0.1 — Lifestyle Tracking Calendar
   Dark theme • Clickable days • Category system • Emoji support
   ═══════════════════════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #0b0d14;
  --bg-card: #131620;
  --bg-input: #0d0f17;
  --border: #1e2230;
  --border-light: #2a2e3a;
  --text: #e4e7f0;
  --text-dim: #7880a0;
  --text-muted: #4a5068;
  --accent: #f0a040;
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(240,160,64,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(129,140,248,0.03) 0%, transparent 50%);
}

/* ═══════════ HEADER ═══════════ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px; max-width: 1100px; margin: 0 auto;
  flex-wrap: wrap; gap: 12px;
}
.month-nav { display: flex; align-items: center; gap: 12px; }
.month-nav button {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-dim); width: 36px; height: 36px; border-radius: 50%;
  font-size: 18px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: all 0.15s;
}
.month-nav button:hover { border-color: var(--accent); color: var(--accent); }
.month-title {
  font-size: 1.4rem; font-weight: 700; color: var(--accent);
  min-width: 180px; text-align: center; letter-spacing: 0.03em;
  text-transform: uppercase;
}

/* ═══════════ LEGEND ═══════════ */
.legend { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.legend-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
.legend-item {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px; font-size: 0.72rem;
  background: var(--bg-card); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.legend-item:hover { border-color: var(--accent); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-add {
  background: transparent; border: 1px dashed var(--border-light);
  color: var(--text-dim); padding: 5px 10px; border-radius: 20px;
  font-size: 0.72rem; cursor: pointer; transition: all 0.15s;
}
.legend-add:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════ CALENDAR ═══════════ */
.calendar-wrap { max-width: 1100px; margin: 0 auto; padding: 0 16px 40px; }
.weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
  margin-bottom: 1px;
}
.weekday {
  text-align: center; padding: 10px 4px; font-size: 0.7rem;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted); background: var(--bg-card);
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
  background: var(--border);
}

/* ═══════════ DAY CELL ═══════════ */
.day-cell {
  background: var(--bg-card); min-height: 90px; padding: 6px 5px 5px;
  cursor: pointer; transition: all 0.15s; position: relative;
  display: flex; flex-direction: column; overflow: hidden;
}
.day-cell:hover { background: #191d2a; }
.day-cell.today { box-shadow: inset 0 0 0 1px var(--accent); }
.day-cell.other-month { opacity: 0.3; pointer-events: none; }
.day-cell .dc-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 4px; flex-shrink: 0;
}
.day-cell .dc-num {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  font-weight: 600; color: var(--text);
}
.day-cell .dc-dow {
  font-size: 9px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.04em;
}
.day-cell .dc-entries {
  display: flex; flex-direction: column; gap: 2px; flex: 1; overflow: hidden;
}
.day-cell .dc-entry {
  border-radius: 3px; padding: 2px 5px; font-size: 10px;
  display: flex; align-items: center; gap: 3px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
  border-left: 2px solid; cursor: pointer;
}
.day-cell .dc-entry .dc-emoji { font-size: 11px; flex-shrink: 0; }
.day-cell .dc-entry .dc-title { font-weight: 500; overflow: hidden; text-overflow: ellipsis; }
.day-cell .dc-entry .dc-time { margin-left: auto; font-size: 9px; opacity: 0.7; flex-shrink: 0; }
.day-cell .dc-more {
  font-size: 9px; color: var(--text-muted); text-align: center;
  padding: 1px 0; flex-shrink: 0;
}

/* ═══════════ MODAL ═══════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: var(--radius); width: 520px; max-width: 95vw;
  max-height: 85vh; overflow-y: auto; padding: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.modal-header h2 { font-size: 1.2rem; font-weight: 700; }
.modal-close {
  background: none; border: none; color: var(--text-dim); font-size: 22px;
  cursor: pointer; padding: 4px 8px; border-radius: 4px;
}
.modal-close:hover { color: var(--text); background: var(--border); }

/* Entry list in modal */
.modal-entries { margin-bottom: 20px; }
.modal-entry {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: var(--bg-input); border-radius: var(--radius-sm);
  margin-bottom: 6px; border-left: 3px solid;
}
.modal-entry .me-emoji { font-size: 1.3rem; flex-shrink: 0; }
.modal-entry .me-info { flex: 1; min-width: 0; }
.modal-entry .me-title { font-weight: 600; font-size: 0.9rem; }
.modal-entry .me-time { font-size: 0.75rem; color: var(--text-dim); }
.modal-entry .me-notes { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
.modal-entry .me-delete {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  padding: 4px 8px; border-radius: 4px; font-size: 16px; flex-shrink: 0;
}
.modal-entry .me-delete:hover { color: #f87171; background: rgba(248,113,113,0.1); }

/* Add form */
.add-form { border-top: 1px solid var(--border); padding-top: 16px; }
.add-form h3 { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
.form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.form-row input, .form-row select, .form-row textarea {
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); padding: 8px 10px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 0.85rem; outline: none;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
.form-row input { flex: 1; min-width: 100px; }
.form-row select { min-width: 120px; }
.form-row textarea { width: 100%; resize: vertical; min-height: 50px; }

.btn {
  background: var(--accent); color: #0b0d14; border: none;
  padding: 8px 18px; border-radius: var(--radius-sm); font-weight: 600;
  font-size: 0.85rem; cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.btn:hover { filter: brightness(1.1); }
.btn-ghost {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); padding: 7px 14px; font-size: 0.8rem;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

.no-entries {
  text-align: center; color: var(--text-muted); padding: 20px;
  font-size: 0.85rem;
}

/* Category manager modal */
.cat-list { margin-bottom: 16px; }
.cat-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  background: var(--bg-input); border-radius: var(--radius-sm); margin-bottom: 4px;
}
.cat-item .cat-emoji { font-size: 1.2rem; }
.cat-item .cat-name { flex: 1; font-size: 0.85rem; }
.cat-item .cat-color { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); }
.cat-item button {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 14px; padding: 2px 6px;
}
.cat-item button:hover { color: #f87171; }
.cat-add-row { display: flex; gap: 6px; align-items: center; }
.cat-add-row input { flex: 1; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #34d399; color: #0b0d14; padding: 10px 20px;
  border-radius: 50px; font-weight: 600; font-size: 0.85rem; z-index: 200;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* Responsive */
@media (max-width: 768px) {
  .header { padding: 12px; }
  .month-title { font-size: 1.1rem; min-width: 140px; }
  .day-cell { min-height: 70px; padding: 4px 3px; }
  .day-cell .dc-num { font-size: 12px; }
  .day-cell .dc-entry { font-size: 9px; padding: 1px 3px; }
  .modal { padding: 16px; }
}
</style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<div class="header">
  <div class="month-nav">
    <button onclick="prevMonth()" title="Iepriekšējais mēnesis">◀</button>
    <div class="month-title" id="month-title"></div>
    <button onclick="nextMonth()" title="Nākamais mēnesis">▶</button>
    <button class="btn-ghost" onclick="goToday()" style="border-radius:20px;margin-left:4px;">Šodien</button>
  </div>
  <div class="legend" id="legend"></div>
</div>

<!-- ═══════════ CALENDAR ═══════════ -->
<div class="calendar-wrap">
  <div class="weekdays" id="weekdays"></div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- ═══════════ DAY MODAL ═══════════ -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<!-- ═══════════ CATEGORY MANAGER MODAL ═══════════ -->
<div class="modal-overlay hidden" id="cat-overlay" onclick="if(event.target===this)closeCatModal()">
  <div class="modal" id="cat-modal"></div>
</div>

<!-- ═══════════ TOAST ═══════════ -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════════════════════════════════
const LS_KEY = 'trackalendar-v1';

const DEFAULT_CATEGORIES = [
  { id: 'sports',  name: 'Sports',   emoji: '💪', color: '#818cf8' },
  { id: 'food',    name: 'Ēdiens',   emoji: '🍽️', color: '#34d399' },
  { id: 'mood',    name: 'Noskaņa',  emoji: '😊', color: '#fbbf24' },
  { id: 'sleep',   name: 'Miegs',    emoji: '😴', color: '#a78bfa' },
  { id: 'health',  name: 'Veselība', emoji: '❤️', color: '#f472b6' },
  { id: 'work',    name: 'Darbs',    emoji: '💼', color: '#60a5fa' },
  { id: 'social',  name: 'Social',   emoji: '🎉', color: '#fb923c' },
  { id: 'hobby',   name: 'Vaļasprieks', emoji: '🎮', color: '#2dd4bf' },
];

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { categories: JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)), months: {} };
}

function saveData(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}

let DATA = loadData();
let currentYear, currentMonth;

// ═══════════════════════════════════════════════════════════════════════════
// CATEGORY HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function catById(id) { return DATA.categories.find(c => c.id === id); }
function getCatColor(id) {
  const c = catById(id);
  return c ? c.color : '#666';
}
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ═══════════════════════════════════════════════════════════════════════════
// DATA ACCESS
// ═══════════════════════════════════════════════════════════════════════════
function monthKey(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }
function dayKey(y, m, d) { return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function getMonthData(y, m) {
  const mk = monthKey(y, m);
  if (!DATA.months[mk]) DATA.months[mk] = {};
  return DATA.months[mk];
}

function getDayEntries(y, m, d) {
  const md = getMonthData(y, m);
  const dk = dayKey(y, m, d);
  return md[dk] || [];
}

function setDayEntries(y, m, d, entries) {
  const md = getMonthData(y, m);
  const dk = dayKey(y, m, d);
  if (entries.length === 0) {
    delete md[dk];
  } else {
    md[dk] = entries;
  }
  saveData(DATA);
}

function addEntry(y, m, d, entry) {
  const entries = getDayEntries(y, m, d);
  entry.id = 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
  entries.push(entry);
  setDayEntries(y, m, d, entries);
  return entry;
}

function deleteEntry(y, m, d, entryId) {
  let entries = getDayEntries(y, m, d);
  entries = entries.filter(e => e.id !== entryId);
  setDayEntries(y, m, d, entries);
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER: LEGEND
// ═══════════════════════════════════════════════════════════════════════════
function renderLegend() {
  const el = document.getElementById('legend');
  let html = '<span class="legend-label">Kategorijas</span>';
  DATA.categories.forEach(c => {
    html += `<div class="legend-item" style="border-left:3px solid ${c.color}" title="${c.name}">
      <span>${c.emoji}</span> ${c.name}
    </div>`;
  });
  html += `<button class="legend-add" onclick="openCatManager()" title="Pārvaldīt kategorijas">+ Pievienot</button>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER: CALENDAR
// ═══════════════════════════════════════════════════════════════════════════
const DAY_NAMES = ['Pr', 'Ot', 'Tr', 'Ce', 'Pk', 'Se', 'Sv'];
const MONTH_NAMES = ['Janvāris','Februāris','Marts','Aprīlis','Maijs','Jūnijs',
                     'Jūlijs','Augusts','Septembris','Oktobris','Novembris','Decembris'];

function renderWeekdays() {
  document.getElementById('weekdays').innerHTML = DAY_NAMES
    .map(d => `<div class="weekday">${d}</div>`).join('');
}

function renderCalendar(y, m) {
  currentYear = y;
  currentMonth = m;

  // Title
  document.getElementById('month-title').textContent = `${MONTH_NAMES[m-1]} ${y}`;

  // Build grid
  const firstDay = new Date(y, m-1, 1);
  const lastDay = new Date(y, m, 0);
  const daysInMonth = lastDay.getDate();
  // getDay(): 0=Sun, 1=Mon, ..., 6=Sat → we want 0=Mon
  let startDow = firstDay.getDay() - 1;
  if (startDow < 0) startDow = 6;

  const today = new Date();
  const todayKey = dayKey(today.getFullYear(), today.getMonth()+1, today.getDate());
  const md = getMonthData(y, m);

  let html = '';

  // Empty cells before month start
  for (let i = 0; i < startDow; i++) {
    html += '<div class="day-cell other-month"></div>';
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const dk = dayKey(y, m, d);
    const dow = (startDow + d - 1) % 7;
    const entries = md[dk] || [];
    const isToday = dk === todayKey;

    let cellClass = 'day-cell';
    if (isToday) cellClass += ' today';

    let inner = '';
    inner += `<div class="dc-head"><span class="dc-num">${d}</span><span class="dc-dow">${DAY_NAMES[dow]}</span></div>`;

    if (entries.length > 0) {
      inner += '<div class="dc-entries">';
      const maxShow = 3;
      entries.slice(0, maxShow).forEach(e => {
        const cat = catById(e.catId);
        const emoji = cat ? cat.emoji : '📌';
        const color = cat ? cat.color : '#666';
        const timeStr = e.start ? `${e.start}${e.end ? '–'+e.end : ''}` : '';
        inner += `<div class="dc-entry" style="background:${hexToRgba(color,0.15)};border-left-color:${color};color:${color}">
          <span class="dc-emoji">${emoji}</span>
          <span class="dc-title">${escHtml(e.title)}</span>
          ${timeStr ? `<span class="dc-time">${timeStr}</span>` : ''}
        </div>`;
      });
      if (entries.length > maxShow) {
        inner += `<div class="dc-more">+${entries.length - maxShow} vēl</div>`;
      }
      inner += '</div>';
    }

    html += `<div class="${cellClass}" onclick="openDay(${y},${m},${d})">${inner}</div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
  renderLegend();
}

// ═══════════════════════════════════════════════════════════════════════════
// MODAL: DAY DETAIL
// ═══════════════════════════════════════════════════════════════════════════
let modalDay = null; // {y, m, d}

function openDay(y, m, d) {
  modalDay = { y, m, d };
  const entries = getDayEntries(y, m, d);
  const dateStr = `${d}. ${MONTH_NAMES[m-1]} ${y}`;
  const dow = new Date(y, m-1, d).getDay();
  const dowName = ['Svētdiena','Pirmdiena','Otrdiena','Trešdiena','Ceturtdiena','Piektdiena','Sestdiena'][dow];

  let entriesHtml = '';
  if (entries.length === 0) {
    entriesHtml = '<div class="no-entries">Šajā dienā nav ierakstu. Pievieno pirmo! 👇</div>';
  } else {
    entriesHtml = entries.map(e => {
      const cat = catById(e.catId);
      const color = cat ? cat.color : '#666';
      const emoji = cat ? cat.emoji : '📌';
      return `<div class="modal-entry" style="border-left-color:${color}">
        <span class="me-emoji">${emoji}</span>
        <div class="me-info">
          <div class="me-title">${escHtml(e.title) || '(bez nosaukuma)'}</div>
          ${e.start ? `<div class="me-time">${e.start}${e.end ? ' – ' + e.end : ''}${e.duration ? ' • ' + e.duration : ''}</div>` : ''}
          ${e.notes ? `<div class="me-notes">${escHtml(e.notes)}</div>` : ''}
        </div>
        <button class="me-delete" onclick="event.stopPropagation();deleteEntryAndRefresh(${y},${m},${d},'${e.id}')" title="Dzēst">✕</button>
      </div>`;
    }).join('');
  }

  // Category options for add form
  const catOptions = DATA.categories.map(c =>
    `<option value="${c.id}">${c.emoji} ${c.name}</option>`
  ).join('');

  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <h2>${dateStr} <span style="color:var(--text-dim);font-weight:400;font-size:0.8em;">${dowName}</span></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-entries">${entriesHtml}</div>
    <div class="add-form">
      <h3>➕ Pievienot ierakstu</h3>
      <form onsubmit="handleAddEntry(event,${y},${m},${d})">
        <div class="form-row">
          <select id="add-cat">${catOptions}</select>
          <input type="text" id="add-title" placeholder="Nosaukums (piem., Rīta skrējiens)" required>
        </div>
        <div class="form-row">
          <input type="time" id="add-start" placeholder="Sākums" style="flex:0.5">
          <input type="time" id="add-end" placeholder="Beigas" style="flex:0.5">
          <input type="text" id="add-duration" placeholder="Ilgums (piem., 1.5h)" style="flex:0.5;min-width:80px;">
        </div>
        <div class="form-row">
          <textarea id="add-notes" placeholder="Piezīmes..."></textarea>
        </div>
        <button type="submit" class="btn">✓ Saglabāt</button>
      </form>
    </div>
  `;

  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  modalDay = null;
  renderCalendar(currentYear, currentMonth);
}

function handleAddEntry(e, y, m, d) {
  e.preventDefault();
  const entry = {
    catId: document.getElementById('add-cat').value,
    title: document.getElementById('add-title').value.trim(),
    start: document.getElementById('add-start').value || null,
    end: document.getElementById('add-end').value || null,
    duration: document.getElementById('add-duration').value.trim() || null,
    notes: document.getElementById('add-notes').value.trim() || null,
  };
  addEntry(y, m, d, entry);
  showToast('Ieraksts pievienots! ✅');
  openDay(y, m, d); // refresh modal
}

function deleteEntryAndRefresh(y, m, d, entryId) {
  deleteEntry(y, m, d, entryId);
  showToast('Ieraksts dzēsts 🗑️');
  openDay(y, m, d);
}

// ═══════════════════════════════════════════════════════════════════════════
// CATEGORY MANAGER
// ═══════════════════════════════════════════════════════════════════════════
function openCatManager() {
  const itemsHtml = DATA.categories.map(c => `
    <div class="cat-item">
      <span class="cat-emoji">${c.emoji}</span>
      <span class="cat-color" style="background:${c.color}"></span>
      <span class="cat-name">${escHtml(c.name)}</span>
      <button onclick="deleteCategory('${c.id}')" title="Dzēst kategoriju">✕</button>
    </div>
  `).join('');

  document.getElementById('cat-modal').innerHTML = `
    <div class="modal-header">
      <h2>🎨 Kategoriju pārvaldība</h2>
      <button class="modal-close" onclick="closeCatModal()">✕</button>
    </div>
    <div class="cat-list">${itemsHtml || '<div class="no-entries">Nav kategoriju</div>'}</div>
    <div class="add-form">
      <h3>➕ Jauna kategorija</h3>
      <form onsubmit="handleAddCategory(event)">
        <div class="cat-add-row" style="margin-bottom:8px;">
          <input type="text" id="new-cat-emoji" placeholder="😎" style="width:50px;text-align:center;font-size:1.2rem;" maxlength="2" required>
          <input type="text" id="new-cat-name" placeholder="Nosaukums" required>
          <input type="color" id="new-cat-color" value="#818cf8" style="width:40px;height:36px;padding:2px;border-radius:6px;">
        </div>
        <button type="submit" class="btn">✓ Pievienot</button>
      </form>
    </div>
  `;

  document.getElementById('cat-overlay').classList.remove('hidden');
}

function closeCatModal() {
  document.getElementById('cat-overlay').classList.add('hidden');
  renderCalendar(currentYear, currentMonth);
}

function handleAddCategory(e) {
  e.preventDefault();
  const emoji = document.getElementById('new-cat-emoji').value.trim();
  const name = document.getElementById('new-cat-name').value.trim();
  const color = document.getElementById('new-cat-color').value;
  const id = 'cat_' + Date.now();
  DATA.categories.push({ id, name, emoji, color });
  saveData(DATA);
  showToast(`Kategorija "${name}" pievienota! ${emoji}`);
  openCatManager();
}

function deleteCategory(catId) {
  const cat = catById(catId);
  if (!cat) return;
  if (!confirm(`Dzēst kategoriju "${cat.name}"? Visi šīs kategorijas ieraksti paliks, bet zaudēs krāsu.`)) return;

  DATA.categories = DATA.categories.filter(c => c.id !== catId);
  saveData(DATA);
  showToast(`Kategorija dzēsta 🗑️`);
  openCatManager();
}

// ═══════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════
function prevMonth() {
  if (currentMonth === 1) { currentMonth = 12; currentYear--; }
  else { currentMonth--; }
  renderCalendar(currentYear, currentMonth);
}

function nextMonth() {
  if (currentMonth === 12) { currentMonth = 1; currentYear++; }
  else { currentMonth++; }
  renderCalendar(currentYear, currentMonth);
}

function goToday() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  renderCalendar(currentYear, currentMonth);
}

// ═══════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════
function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeCatModal();
  }
  if (e.key === 'ArrowLeft' && !document.querySelector('.modal-overlay:not(.hidden)')) prevMonth();
  if (e.key === 'ArrowRight' && !document.querySelector('.modal-overlay:not(.hidden)')) nextMonth();
});

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
renderWeekdays();
goToday();
</script>
