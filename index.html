<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trackalendar — Lifestyle Tracker</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   TRACKALENDAR v0.2 — Tab-based independent calendars
   Each tab = separate calendar with own tracking items
   ═══════════════════════════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #0b0d14;
  --bg-card: #131620;
  --bg-input: #0d0f17;
  --border: #1e2230;
  --border-light: #2a2e3a;
  --text: #e4e7f0;
  --text-dim: #7880a0;
  --text-muted: #4a5068;
  --accent: #f0a040;
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(240,160,64,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(129,140,248,0.03) 0%, transparent 50%);
}

/* ═══════════ TOP BAR ═══════════ */
.top-bar {
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  padding: 12px 20px; position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; gap: 8px;
}
.app-title {
  font-size: 1.1rem; font-weight: 700; color: var(--accent);
  margin-right: 12px; flex-shrink: 0; white-space: nowrap;
}
.tabs-scroll {
  display: flex; gap: 4px; overflow-x: auto; flex: 1;
  scrollbar-width: none; -ms-overflow-style: none; padding: 2px 0;
}
.tabs-scroll::-webkit-scrollbar { display: none; }
.tab-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 14px; border-radius: 20px; font-size: 0.78rem;
  font-weight: 500; cursor: pointer; transition: all 0.15s;
  background: transparent; border: 1px solid transparent;
  color: var(--text-dim); white-space: nowrap; flex-shrink: 0;
  user-select: none;
}
.tab-pill:hover { border-color: var(--border-light); color: var(--text); }
.tab-pill.active {
  background: rgba(240,160,64,0.12); border-color: var(--accent);
  color: var(--accent); font-weight: 600;
}
.tab-add {
  background: transparent; border: 1px dashed var(--border-light);
  color: var(--text-muted); padding: 6px 10px; border-radius: 50%;
  font-size: 16px; cursor: pointer; flex-shrink: 0; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.tab-add:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════ HEADER (month nav + items) ═══════════ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px 10px; max-width: 1100px; margin: 0 auto;
  flex-wrap: wrap; gap: 10px;
}
.month-nav { display: flex; align-items: center; gap: 10px; }
.month-nav button {
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-dim); width: 34px; height: 34px; border-radius: 50%;
  font-size: 16px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: all 0.15s;
}
.month-nav button:hover { border-color: var(--accent); color: var(--accent); }
.month-title {
  font-size: 1.25rem; font-weight: 700; color: var(--accent);
  min-width: 170px; text-align: center; letter-spacing: 0.03em;
  text-transform: uppercase;
}
.btn-today {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); padding: 5px 14px; border-radius: 20px;
  font-size: 0.72rem; cursor: pointer; font-family: inherit;
}
.btn-today:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════ ITEMS LEGEND ═══════════ */
.items-bar {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.items-label {
  font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.08em; margin-right: 2px;
}
.item-pill {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 14px; font-size: 0.7rem;
  background: var(--bg-card); cursor: pointer;
  transition: all 0.15s; white-space: nowrap; user-select: none;
}
.item-pill:hover { filter: brightness(1.3); }
.item-pill .ip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.item-pill .ip-count { font-size: 0.65rem; margin-left: 2px; opacity: 0.7; }
.item-add {
  background: transparent; border: 1px dashed var(--border-light);
  color: var(--text-muted); padding: 3px 10px; border-radius: 14px;
  font-size: 0.7rem; cursor: pointer;
}
.item-add:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════ CALENDAR ═══════════ */
.calendar-wrap { max-width: 1100px; margin: 0 auto; padding: 0 16px 40px; }
.weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
  margin-bottom: 1px;
}
.weekday {
  text-align: center; padding: 10px 4px; font-size: 0.7rem;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-muted); background: var(--bg-card);
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
  background: var(--border);
}

/* ═══════════ DAY CELL ═══════════ */
.day-cell {
  background: var(--bg-card); min-height: 90px; padding: 6px 5px 5px;
  cursor: pointer; transition: all 0.15s; position: relative;
  display: flex; flex-direction: column; overflow: hidden;
}
.day-cell:hover { background: #191d2a; }
.day-cell.today { box-shadow: inset 0 0 0 1px var(--accent); }
.day-cell.other-month { opacity: 0.25; pointer-events: none; }
.day-cell .dc-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 4px; flex-shrink: 0;
}
.day-cell .dc-num {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  font-weight: 600; color: var(--text);
}
.day-cell .dc-dow {
  font-size: 9px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.04em;
}
.day-cell .dc-entries {
  display: flex; flex-direction: column; gap: 2px; flex: 1; overflow: hidden;
}
.day-cell .dc-entry {
  border-radius: 3px; padding: 2px 5px; font-size: 10px;
  display: flex; align-items: center; gap: 3px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; flex-shrink: 0;
  border-left: 2px solid; cursor: pointer;
}
.day-cell .dc-entry .dc-emoji { font-size: 10px; flex-shrink: 0; }
.day-cell .dc-entry .dc-title { font-weight: 500; overflow: hidden; text-overflow: ellipsis; }
.day-cell .dc-entry .dc-time { margin-left: auto; font-size: 9px; opacity: 0.7; flex-shrink: 0; }
.day-cell .dc-more {
  font-size: 9px; color: var(--text-muted); text-align: center;
  padding: 1px 0; flex-shrink: 0;
}
.day-cell.empty-tab {
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 0.7rem;
}

/* ═══════════ MODAL ═══════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: var(--radius); width: 520px; max-width: 95vw;
  max-height: 85vh; overflow-y: auto; padding: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px;
}
.modal-header h2 { font-size: 1.15rem; font-weight: 700; }
.modal-close {
  background: none; border: none; color: var(--text-dim); font-size: 20px;
  cursor: pointer; padding: 4px 10px; border-radius: 4px;
}
.modal-close:hover { color: var(--text); background: var(--border); }

.modal-entries { margin-bottom: 16px; }
.modal-entry {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; background: var(--bg-input); border-radius: var(--radius-sm);
  margin-bottom: 6px; border-left: 3px solid;
}
.modal-entry .me-emoji { font-size: 1.2rem; flex-shrink: 0; }
.modal-entry .me-info { flex: 1; min-width: 0; }
.modal-entry .me-title { font-weight: 600; font-size: 0.88rem; }
.modal-entry .me-meta { font-size: 0.73rem; color: var(--text-dim); }
.modal-entry .me-notes { font-size: 0.73rem; color: var(--text-muted); margin-top: 2px; }
.modal-entry .me-delete {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  padding: 4px 8px; border-radius: 4px; font-size: 15px; flex-shrink: 0;
}
.modal-entry .me-delete:hover { color: #f87171; background: rgba(248,113,113,0.1); }

.add-form { border-top: 1px solid var(--border); padding-top: 14px; }
.add-form h3 { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
.form-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.form-row input, .form-row select, .form-row textarea {
  background: var(--bg-input); border: 1px solid var(--border);
  color: var(--text); padding: 8px 10px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 0.84rem; outline: none;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--accent); }
.form-row input { flex: 1; min-width: 100px; }
.form-row select { min-width: 120px; }
.form-row textarea { width: 100%; resize: vertical; min-height: 45px; }

.btn {
  background: var(--accent); color: #0b0d14; border: none;
  padding: 8px 18px; border-radius: var(--radius-sm); font-weight: 600;
  font-size: 0.84rem; cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.btn:hover { filter: brightness(1.1); }
.btn-ghost {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-dim); padding: 7px 14px; font-size: 0.78rem; border-radius: var(--radius-sm);
  cursor: pointer; font-family: inherit;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger {
  background: transparent; border: 1px solid rgba(248,113,113,0.3);
  color: #f87171; padding: 7px 14px; font-size: 0.78rem; border-radius: var(--radius-sm);
  cursor: pointer; font-family: inherit;
}
.btn-danger:hover { background: rgba(248,113,113,0.1); }

.no-entries {
  text-align: center; color: var(--text-muted); padding: 20px;
  font-size: 0.84rem;
}

/* ═══════════ MANAGER MODALS ═══════════ */
.mgr-list { margin-bottom: 14px; }
.mgr-item {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px;
  background: var(--bg-input); border-radius: var(--radius-sm); margin-bottom: 4px;
}
.mgr-item .mgr-emoji { font-size: 1.1rem; }
.mgr-item .mgr-name { flex: 1; font-size: 0.84rem; }
.mgr-item .mgr-color { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); }
.mgr-item button {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 14px; padding: 2px 6px;
}
.mgr-item button:hover { color: #f87171; }
.mgr-add-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.mgr-add-row input { flex: 1; min-width: 80px; }
.mgr-add-row input[type="color"] { width: 36px; height: 34px; padding: 2px; border-radius: 6px; flex: 0; }

/* ═══════════ TOAST ═══════════ */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #34d399; color: #0b0d14; padding: 10px 20px;
  border-radius: 50px; font-weight: 600; font-size: 0.84rem; z-index: 200;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* ═══════════ RESPONSIVE ═══════════ */
@media (max-width: 768px) {
  .top-bar { padding: 8px 10px; }
  .app-title { font-size: 0.9rem; margin-right: 6px; }
  .tab-pill { padding: 4px 10px; font-size: 0.7rem; }
  .header { padding: 10px 10px 6px; }
  .month-title { font-size: 1rem; min-width: 130px; }
  .day-cell { min-height: 70px; padding: 4px 3px; }
  .day-cell .dc-num { font-size: 12px; }
  .day-cell .dc-entry { font-size: 9px; padding: 1px 3px; }
  .modal { padding: 14px; }
}
</style>
</head>
<body>

<!-- ═══════════ TOP TAB BAR ═══════════ -->
<div class="top-bar">
  <span class="app-title">Trackalendar</span>
  <div class="tabs-scroll" id="tabs-bar"></div>
  <button class="tab-add" onclick="openTabManager()" title="Pievienot tab">+</button>
</div>

<!-- ═══════════ HEADER ═══════════ -->
<div class="header">
  <div class="month-nav">
    <button onclick="prevMonth()" title="Iepriekšējais mēnesis">◀</button>
    <div class="month-title" id="month-title"></div>
    <button onclick="nextMonth()" title="Nākamais mēnesis">▶</button>
    <button class="btn-today" onclick="goToday()">Šodien</button>
  </div>
  <div class="items-bar" id="items-bar"></div>
</div>

<!-- ═══════════ CALENDAR ═══════════ -->
<div class="calendar-wrap">
  <div class="weekdays" id="weekdays"></div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- ═══════════ DAY MODAL ═══════════ -->
<div class="modal-overlay hidden" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<!-- ═══════════ TAB MANAGER MODAL ═══════════ -->
<div class="modal-overlay hidden" id="tab-mgr-overlay" onclick="if(event.target===this)closeTabManager()">
  <div class="modal" id="tab-mgr-modal"></div>
</div>

<!-- ═══════════ ITEMS MANAGER MODAL ═══════════ -->
<div class="modal-overlay hidden" id="item-mgr-overlay" onclick="if(event.target===this)closeItemManager()">
  <div class="modal" id="item-mgr-modal"></div>
</div>

<!-- ═══════════ TOAST ═══════════ -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// DATA LAYER — v0.2 tab-based architecture
// ═══════════════════════════════════════════════════════════════════════════
const LS_KEY = 'trackalendar-v2';

const DEFAULT_DATA = {
  activeTab: 'sports',
  tabs: [
    { id: 'sports',       name: 'Sports',       emoji: '💪', color: '#818cf8' },
    { id: 'food',         name: 'Ēdiens',       emoji: '🍽️', color: '#34d399' },
    { id: 'mood',         name: 'Noskaņa',      emoji: '😊', color: '#fbbf24' },
    { id: 'sleep',        name: 'Miegs',        emoji: '😴', color: '#a78bfa' },
    { id: 'health',       name: 'Veselība',     emoji: '❤️', color: '#f472b6' },
    { id: 'relationships',name: 'Attiecības',   emoji: '💕', color: '#fb7185' },
    { id: 'work',         name: 'Darbs',        emoji: '💼', color: '#60a5fa' },
    { id: 'social',       name: 'Social',       emoji: '🎉', color: '#fb923c' },
    { id: 'hobby',        name: 'Vaļasprieks',  emoji: '🎮', color: '#2dd4bf' },
  ],
  tabData: {
    sports:        { items: [{id:'gym',name:'Gym',emoji:'🏋️',color:'#818cf8'},{id:'protein',name:'Proteīns',emoji:'🥩',color:'#60a5fa'},{id:'cardio',name:'Kardio',emoji:'🏃',color:'#34d399'},{id:'weight',name:'Svars',emoji:'⚖️',color:'#c084fc'}], months:{} },
    food:          { items: [{id:'breakfast',name:'Brokastis',emoji:'🥐',color:'#fbbf24'},{id:'lunch',name:'Pusdienas',emoji:'🍲',color:'#34d399'},{id:'dinner',name:'Vakariņas',emoji:'🍝',color:'#f472b6'},{id:'snack',name:'Uzkodas',emoji:'🍿',color:'#fb923c'}], months:{} },
    mood:          { items: [{id:'mood_am',name:'Rīta noskaņa',emoji:'🌅',color:'#fbbf24'},{id:'mood_pm',name:'Vakara noskaņa',emoji:'🌙',color:'#a78bfa'},{id:'stress',name:'Stress',emoji:'😰',color:'#f87171'},{id:'energy',name:'Enerģija',emoji:'⚡',color:'#facc15'}], months:{} },
    sleep:         { items: [{id:'bedtime',name:'Gulētiešana',emoji:'🛌',color:'#a78bfa'},{id:'wakeup',name:'Pamošanās',emoji:'⏰',color:'#fbbf24'},{id:'quality',name:'Kvalitāte',emoji:'⭐',color:'#60a5fa'}], months:{} },
    health:        { items: [{id:'meds',name:'Zāles',emoji:'💊',color:'#f472b6'},{id:'symptoms',name:'Simptomi',emoji:'🤒',color:'#fb923c'},{id:'water',name:'Ūdens',emoji:'💧',color:'#60a5fa'}], months:{} },
    relationships: { items: [{id:'sex',name:'Sekss',emoji:'🔥',color:'#f472b6'},{id:'quality_r',name:'Kvalitāte',emoji:'⭐',color:'#fbbf24'},{id:'date',name:'Randiņš',emoji:'🌹',color:'#fb7185'},{id:'conflict',name:'Konflikts',emoji:'⚡',color:'#f87171'}], months:{} },
    work:          { items: [{id:'task',name:'Uzdevums',emoji:'📋',color:'#60a5fa'},{id:'meeting',name:'Sapulce',emoji:'🗣️',color:'#818cf8'},{id:'focus',name:'Fokuss',emoji:'🎯',color:'#34d399'}], months:{} },
    social:        { items: [{id:'event',name:'Pasākums',emoji:'🎉',color:'#fb923c'},{id:'call',name:'Zvans',emoji:'📞',color:'#60a5fa'},{id:'msg',name:'Ziņa',emoji:'💬',color:'#a78bfa'}], months:{} },
    hobby:         { items: [{id:'gaming',name:'Spēles',emoji:'🎮',color:'#2dd4bf'},{id:'reading',name:'Lasīšana',emoji:'📚',color:'#fbbf24'},{id:'music',name:'Mūzika',emoji:'🎵',color:'#f472b6'}], months:{} },
  }
};

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      // Ensure all tabs from DEFAULT_DATA exist
      DEFAULT_DATA.tabs.forEach(dt => {
        if (!d.tabs.find(t => t.id === dt.id)) d.tabs.push(dt);
        if (!d.tabData[dt.id]) d.tabData[dt.id] = JSON.parse(JSON.stringify(DEFAULT_DATA.tabData[dt.id] || {items:[],months:{}}));
      });
      return d;
    }
  } catch(e) { console.error('Load error:', e); }
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() { localStorage.setItem(LS_KEY, JSON.stringify(DATA)); }

let DATA = loadData();
let currentYear, currentMonth;

// ═══════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function activeTab() { return DATA.tabs.find(t => t.id === DATA.activeTab); }
function tabById(id) { return DATA.tabs.find(t => t.id === id); }
function itemById(tabId, itemId) {
  const td = DATA.tabData[tabId];
  return td ? td.items.find(i => i.id === itemId) : null;
}
function hexToRgba(hex, alpha) {
  if (!hex) return `rgba(100,100,100,${alpha})`;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function monthKey(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }
function dayKey(y, m, d) { return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function getMonthData(y, m) {
  const td = DATA.tabData[DATA.activeTab];
  if (!td) return {};
  const mk = monthKey(y, m);
  if (!td.months[mk]) td.months[mk] = {};
  return td.months[mk];
}

function getDayEntries(y, m, d) {
  const md = getMonthData(y, m);
  const dk = dayKey(y, m, d);
  return md[dk] || [];
}

function setDayEntries(y, m, d, entries) {
  const md = getMonthData(y, m);
  const dk = dayKey(y, m, d);
  if (entries.length === 0) delete md[dk];
  else md[dk] = entries;
  saveData();
}

function addEntry(y, m, d, entry) {
  const entries = getDayEntries(y, m, d);
  entry.id = 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
  entries.push(entry);
  setDayEntries(y, m, d, entries);
  return entry;
}

function deleteEntry(y, m, d, entryId) {
  const entries = getDayEntries(y, m, d).filter(e => e.id !== entryId);
  setDayEntries(y, m, d, entries);
}

function getActiveItems() {
  const td = DATA.tabData[DATA.activeTab];
  return td ? td.items : [];
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER: TABS BAR
// ═══════════════════════════════════════════════════════════════════════════
function renderTabs() {
  const el = document.getElementById('tabs-bar');
  el.innerHTML = DATA.tabs.map(t => {
    const active = t.id === DATA.activeTab ? ' active' : '';
    return `<div class="tab-pill${active}" onclick="switchTab('${t.id}')">
      <span>${t.emoji}</span> ${t.name}
    </div>`;
  }).join('');
}

function switchTab(tabId) {
  DATA.activeTab = tabId;
  saveData();
  goToday();
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER: ITEMS BAR (legend for active tab)
// ═══════════════════════════════════════════════════════════════════════════
function renderItemsBar() {
  const el = document.getElementById('items-bar');
  const items = getActiveItems();
  const tab = activeTab();
  if (!tab) { el.innerHTML = ''; return; }

  let html = '<span class="items-label">Tracking</span>';
  items.forEach(item => {
    html += `<div class="item-pill" style="background:${hexToRgba(item.color,0.15)};border:1px solid ${hexToRgba(item.color,0.3)};">
      <span class="ip-dot" style="background:${item.color}"></span>
      <span>${item.emoji} ${item.name}</span>
    </div>`;
  });
  html += `<button class="item-add" onclick="openItemManager()" title="Pievienot tracking item">+</button>`;
  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER: CALENDAR
// ═══════════════════════════════════════════════════════════════════════════
const DAY_NAMES = ['Pr', 'Ot', 'Tr', 'Ce', 'Pk', 'Se', 'Sv'];
const MONTH_NAMES = ['Janvāris','Februāris','Marts','Aprīlis','Maijs','Jūnijs',
                     'Jūlijs','Augusts','Septembris','Oktobris','Novembris','Decembris'];

function renderWeekdays() {
  document.getElementById('weekdays').innerHTML = DAY_NAMES
    .map(d => `<div class="weekday">${d}</div>`).join('');
}

function renderCalendar(y, m) {
  currentYear = y;
  currentMonth = m;

  document.getElementById('month-title').textContent = `${MONTH_NAMES[m-1]} ${y}`;

  const firstDay = new Date(y, m-1, 1);
  const daysInMonth = new Date(y, m, 0).getDate();
  let startDow = firstDay.getDay() - 1;
  if (startDow < 0) startDow = 6;

  const today = new Date();
  const todayKey = dayKey(today.getFullYear(), today.getMonth()+1, today.getDate());
  const md = getMonthData(y, m);

  let html = '';
  for (let i = 0; i < startDow; i++) {
    html += '<div class="day-cell other-month"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dk = dayKey(y, m, d);
    const dow = (startDow + d - 1) % 7;
    const entries = md[dk] || [];
    const isToday = dk === todayKey;

    let cellClass = 'day-cell';
    if (isToday) cellClass += ' today';

    let inner = `<div class="dc-head"><span class="dc-num">${d}</span><span class="dc-dow">${DAY_NAMES[dow]}</span></div>`;

    if (entries.length > 0) {
      inner += '<div class="dc-entries">';
      const maxShow = 3;
      entries.slice(0, maxShow).forEach(e => {
        const item = itemById(DATA.activeTab, e.itemId);
        const emoji = item ? item.emoji : '📌';
        const color = item ? item.color : '#666';
        const timeStr = e.start ? `${e.start}${e.end ? '–'+e.end : ''}` : '';
        const title = e.title || (item ? item.name : '???');
        inner += `<div class="dc-entry" style="background:${hexToRgba(color,0.15)};border-left-color:${color};color:${color}">
          <span class="dc-emoji">${emoji}</span>
          <span class="dc-title">${escHtml(title)}</span>
          ${timeStr ? `<span class="dc-time">${timeStr}</span>` : ''}
        </div>`;
      });
      if (entries.length > maxShow) {
        inner += `<div class="dc-more">+${entries.length - maxShow} vēl</div>`;
      }
      inner += '</div>';
    }

    html += `<div class="${cellClass}" onclick="openDay(${y},${m},${d})">${inner}</div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
  renderTabs();
  renderItemsBar();
}

// ═══════════════════════════════════════════════════════════════════════════
// MODAL: DAY DETAIL
// ═══════════════════════════════════════════════════════════════════════════
function openDay(y, m, d) {
  const entries = getDayEntries(y, m, d);
  const tab = activeTab();
  const dateStr = `${d}. ${MONTH_NAMES[m-1]} ${y}`;
  const dow = new Date(y, m-1, d).getDay();
  const dowName = ['Svētdiena','Pirmdiena','Otrdiena','Trešdiena','Ceturtdiena','Piektdiena','Sestdiena'][dow];

  let entriesHtml = '';
  if (entries.length === 0) {
    entriesHtml = '<div class="no-entries">Nav ierakstu. Pievieno pirmo! 👇</div>';
  } else {
    entriesHtml = entries.map(e => {
      const item = itemById(DATA.activeTab, e.itemId);
      const color = item ? item.color : '#666';
      const emoji = item ? item.emoji : '📌';
      const itemName = item ? item.name : '???';
      return `<div class="modal-entry" style="border-left-color:${color}">
        <span class="me-emoji">${emoji}</span>
        <div class="me-info">
          <div class="me-title">${escHtml(e.title || itemName)}</div>
          <div class="me-meta">${itemName}${e.start ? ' • ' + e.start : ''}${e.end ? '–' + e.end : ''}${e.value ? ' • ' + e.value : ''}</div>
          ${e.notes ? `<div class="me-notes">${escHtml(e.notes)}</div>` : ''}
        </div>
        <button class="me-delete" onclick="event.stopPropagation();deleteEntryAndRefresh(${y},${m},${d},'${e.id}')" title="Dzēst">✕</button>
      </div>`;
    }).join('');
  }

  const items = getActiveItems();
  const itemOptions = items.map(i =>
    `<option value="${i.id}">${i.emoji} ${i.name}</option>`
  ).join('');

  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <h2>${tab ? tab.emoji : ''} ${dateStr} <span style="color:var(--text-dim);font-weight:400;font-size:0.75em;">${dowName}</span></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-entries">${entriesHtml}</div>
    <div class="add-form">
      <h3>➕ Pievienot ierakstu</h3>
      <form onsubmit="handleAddEntry(event,${y},${m},${d})">
        <div class="form-row">
          <select id="add-item">${itemOptions}</select>
          <input type="text" id="add-title" placeholder="Apraksts (piem., Rīta skrējiens)">
        </div>
        <div class="form-row">
          <input type="time" id="add-start" style="flex:0.5" placeholder="Sākums">
          <input type="time" id="add-end" style="flex:0.5" placeholder="Beigas">
          <input type="text" id="add-value" placeholder="Vērtība (piem., 10x3, 7/10)" style="flex:0.5;min-width:100px;">
        </div>
        <div class="form-row">
          <textarea id="add-notes" placeholder="Piezīmes..."></textarea>
        </div>
        <button type="submit" class="btn">✓ Saglabāt</button>
      </form>
    </div>
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  renderCalendar(currentYear, currentMonth);
}

function handleAddEntry(e, y, m, d) {
  e.preventDefault();
  const entry = {
    itemId: document.getElementById('add-item').value,
    title: document.getElementById('add-title').value.trim() || null,
    start: document.getElementById('add-start').value || null,
    end: document.getElementById('add-end').value || null,
    value: document.getElementById('add-value').value.trim() || null,
    notes: document.getElementById('add-notes').value.trim() || null,
  };
  addEntry(y, m, d, entry);
  showToast('Ieraksts pievienots! ✅');
  openDay(y, m, d);
}

function deleteEntryAndRefresh(y, m, d, entryId) {
  deleteEntry(y, m, d, entryId);
  showToast('Ieraksts dzēsts 🗑️');
  openDay(y, m, d);
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB MANAGER
// ═══════════════════════════════════════════════════════════════════════════
function openTabManager() {
  const itemsHtml = DATA.tabs.map(t => `
    <div class="mgr-item">
      <span class="mgr-emoji">${t.emoji}</span>
      <span class="mgr-color" style="background:${t.color}"></span>
      <span class="mgr-name">${escHtml(t.name)}</span>
      ${DATA.tabs.length > 1 ? `<button onclick="deleteTab('${t.id}')" title="Dzēst tab">✕</button>` : ''}
    </div>
  `).join('');

  document.getElementById('tab-mgr-modal').innerHTML = `
    <div class="modal-header">
      <h2>📑 Tab pārvaldība</h2>
      <button class="modal-close" onclick="closeTabManager()">✕</button>
    </div>
    <div class="mgr-list">${itemsHtml}</div>
    <div class="add-form">
      <h3>➕ Jauns tabs</h3>
      <form onsubmit="handleAddTab(event)">
        <div class="mgr-add-row" style="margin-bottom:8px;">
          <input type="text" id="new-tab-emoji" placeholder="😎" style="width:50px;text-align:center;font-size:1.1rem;" maxlength="3" required>
          <input type="text" id="new-tab-name" placeholder="Nosaukums" required>
          <input type="color" id="new-tab-color" value="#818cf8">
        </div>
        <button type="submit" class="btn">✓ Pievienot</button>
      </form>
    </div>
  `;
  document.getElementById('tab-mgr-overlay').classList.remove('hidden');
}

function closeTabManager() {
  document.getElementById('tab-mgr-overlay').classList.add('hidden');
  renderTabs();
}

function handleAddTab(e) {
  e.preventDefault();
  const emoji = document.getElementById('new-tab-emoji').value.trim();
  const name = document.getElementById('new-tab-name').value.trim();
  const color = document.getElementById('new-tab-color').value;
  const id = 'tab_' + Date.now();
  DATA.tabs.push({ id, name, emoji, color });
  DATA.tabData[id] = { items: [], months: {} };
  DATA.activeTab = id;
  saveData();
  showToast(`Tabs "${name}" pievienots! ${emoji}`);
  closeTabManager();
  goToday();
}

function deleteTab(tabId) {
  const tab = tabById(tabId);
  if (!tab) return;
  if (!confirm(`Dzēst tabu "${tab.name}"? Visi šī taba dati tiks zaudēti!`)) return;
  DATA.tabs = DATA.tabs.filter(t => t.id !== tabId);
  delete DATA.tabData[tabId];
  if (DATA.activeTab === tabId) DATA.activeTab = DATA.tabs[0]?.id || '';
  saveData();
  showToast(`Tabs dzēsts 🗑️`);
  closeTabManager();
  goToday();
}

// ═══════════════════════════════════════════════════════════════════════════
// ITEM MANAGER (tracking items for active tab)
// ═══════════════════════════════════════════════════════════════════════════
function openItemManager() {
  const tab = activeTab();
  const items = getActiveItems();

  const itemsHtml = items.map(i => `
    <div class="mgr-item">
      <span class="mgr-emoji">${i.emoji}</span>
      <span class="mgr-color" style="background:${i.color}"></span>
      <span class="mgr-name">${escHtml(i.name)}</span>
      <button onclick="deleteItem('${i.id}')" title="Dzēst">✕</button>
    </div>
  `).join('');

  document.getElementById('item-mgr-modal').innerHTML = `
    <div class="modal-header">
      <h2>🏷️ Tracking itemi: ${tab ? tab.emoji + ' ' + tab.name : ''}</h2>
      <button class="modal-close" onclick="closeItemManager()">✕</button>
    </div>
    <div class="mgr-list">${itemsHtml || '<div class="no-entries">Nav tracking itemu</div>'}</div>
    <div class="add-form">
      <h3>➕ Jauns tracking items</h3>
      <form onsubmit="handleAddItem(event)">
        <div class="mgr-add-row" style="margin-bottom:8px;">
          <input type="text" id="new-item-emoji" placeholder="🏷️" style="width:50px;text-align:center;font-size:1.1rem;" maxlength="3" required>
          <input type="text" id="new-item-name" placeholder="Nosaukums" required>
          <input type="color" id="new-item-color" value="#818cf8">
        </div>
        <button type="submit" class="btn">✓ Pievienot</button>
      </form>
    </div>
  `;
  document.getElementById('item-mgr-overlay').classList.remove('hidden');
}

function closeItemManager() {
  document.getElementById('item-mgr-overlay').classList.add('hidden');
  renderItemsBar();
}

function handleAddItem(e) {
  e.preventDefault();
  const emoji = document.getElementById('new-item-emoji').value.trim();
  const name = document.getElementById('new-item-name').value.trim();
  const color = document.getElementById('new-item-color').value;
  const id = 'item_' + Date.now();
  const td = DATA.tabData[DATA.activeTab];
  if (!td) return;
  td.items.push({ id, name, emoji, color });
  saveData();
  showToast(`"${name}" pievienots! ${emoji}`);
  openItemManager();
}

function deleteItem(itemId) {
  const td = DATA.tabData[DATA.activeTab];
  if (!td) return;
  const item = td.items.find(i => i.id === itemId);
  if (!item) return;
  if (!confirm(`Dzēst "${item.name}"? Esošie ieraksti paliks, bet bez kategorijas.`)) return;
  td.items = td.items.filter(i => i.id !== itemId);
  saveData();
  showToast(`Item dzēsts 🗑️`);
  openItemManager();
}

// ═══════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════
function prevMonth() {
  if (currentMonth === 1) { currentMonth = 12; currentYear--; }
  else { currentMonth--; }
  renderCalendar(currentYear, currentMonth);
}
function nextMonth() {
  if (currentMonth === 12) { currentMonth = 1; currentYear++; }
  else { currentMonth++; }
  renderCalendar(currentYear, currentMonth);
}
function goToday() {
  const now = new Date();
  currentYear = now.getFullYear();
  currentMonth = now.getMonth() + 1;
  renderCalendar(currentYear, currentMonth);
}

// ═══════════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════════
function escHtml(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal(); closeTabManager(); closeItemManager();
  }
  if (!document.querySelector('.modal-overlay:not(.hidden)')) {
    if (e.key === 'ArrowLeft') prevMonth();
    if (e.key === 'ArrowRight') nextMonth();
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
renderWeekdays();
renderTabs();
goToday();
</script>
